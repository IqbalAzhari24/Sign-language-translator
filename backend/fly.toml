# Fly.io deployment config. Run from the backend/ directory:
#   fly launch --no-deploy   (first time only, picks up this file, sets an app name)
#   fly deploy
#
# WebSockets work out of the box through Fly's proxy — no extra config needed
# beyond internal_port below.

app = "sign-language-translator-backend" # must be globally unique; fly launch will prompt to change it
primary_region = "sin"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
